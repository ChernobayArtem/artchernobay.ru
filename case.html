<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кейс — Артём Чернобай</title>
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root{
      --bg:#ffffff;--surface:#f8f7f4;--border:rgba(0,0,0,0.08);--border-hover:rgba(0,0,0,0.22);
      --text:#0c0c0c;--text2:#444444;--muted:#888888;--muted2:#555555;
      --card:#fafaf7;--tag:#f0eeea;--inv:#0c0c0c;--invt:#ffffff;--accent:#2563eb;
      --nav-bg:rgba(255,255,255,0.92);
      --shadow:0 8px 28px rgba(0,0,0,0.07);--shadow-lg:0 20px 60px rgba(0,0,0,0.18);
    }
    [data-theme="dark"]{
      --bg:#0c0c0c;--surface:#161616;--border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.22);
      --text:#efefef;--text2:#cccccc;--muted:#666666;--muted2:#aaaaaa;
      --card:#131313;--tag:#1e1e1e;--inv:#efefef;--invt:#0c0c0c;--accent:#3b82f6;
      --nav-bg:rgba(12,12,12,0.92);--shadow:0 8px 28px rgba(0,0,0,0.35);--shadow-lg:0 20px 60px rgba(0,0,0,0.6);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg);color:var(--text);
      transition:background .25s,color .25s;
      -webkit-font-smoothing:antialiased;overflow-x:hidden;
    }
    .sg{font-family:'Space Grotesk',system-ui,sans-serif}

    /* NAV */
    .nav{
      position:sticky;top:0;z-index:200;
      background:var(--nav-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:0.5px solid var(--border);
      padding:13px 32px;
      display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:24px;
    }
    .nav-logo{
      position:relative;display:inline-block;
      font-weight:700;font-size:15px;letter-spacing:-0.02em;
      color:var(--text);text-decoration:none;flex-shrink:0;overflow:visible;
    }
    .logo-short,.logo-full{display:block;white-space:nowrap;transition:opacity .22s,transform .22s}
    .logo-short{opacity:1;transform:translateX(0)}
    .logo-full{position:absolute;left:0;top:0;opacity:0;transform:translateX(-6px);pointer-events:none}
    .nav-logo:hover .logo-short{opacity:0;transform:translateX(6px)}
    .nav-logo:hover .logo-full{opacity:1;transform:translateX(0);pointer-events:auto}
    .logo-fan-tooltip{
      position:absolute;top:calc(100% + 10px);left:0;white-space:nowrap;
      background:var(--bg);border:0.5px solid var(--border);
      border-radius:10px;padding:7px 12px;font-size:12px;font-weight:500;color:var(--text);
      box-shadow:var(--shadow);display:flex;align-items:center;gap:7px;
      opacity:0;transform:translateY(-4px);pointer-events:none;
      transition:opacity .2s,transform .2s;z-index:200;font-family:'Inter',sans-serif;
    }
    .logo-fan-icon{width:16px;height:16px;border-radius:3px;flex-shrink:0}
    .nav-logo:hover .logo-fan-tooltip{opacity:1;transform:translateY(0)}
    .nav-links{display:flex;gap:24px;justify-self:center}
    .nav-link{
      font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;
      transition:color .15s;position:relative;
    }
    .nav-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--text);transition:width .2s}
    .nav-link:hover::after{width:100%}
    .nav-link:hover{color:var(--text)}
    .theme-btn{
      width:32px;height:32px;border-radius:9px;border:none;
      background:var(--inv);color:var(--invt);cursor:pointer;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:14px;
      transition:opacity .15s,transform .2s;justify-self:end;
    }
    .theme-btn:hover{opacity:.8;transform:translateY(-2px)}
    .back-btn{
      font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;
      display:inline-flex;align-items:center;gap:6px;transition:color .15s;
    }
    .back-btn:hover{color:var(--text)}

    .case-cat{
      display:inline-block;
      font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
      color:var(--muted2);background:var(--tag);border:0.5px solid var(--border);
      border-radius:20px;padding:3px 10px;
    }

    /* ============ STACK (3D) ============ */
    .stack{
      height:calc(100vh - 58px);
      position:relative;display:flex;flex-direction:column;overflow:hidden;
      touch-action:none;
    }
    .stack-head{position:absolute;top:22px;left:32px;right:32px;z-index:40;pointer-events:none}
    .stack-head a,.stack-head .case-cat{pointer-events:auto}
    .stack-title{
      font-family:'Space Grotesk',system-ui,sans-serif;
      font-size:clamp(26px,3.4vw,42px);font-weight:700;letter-spacing:-.03em;line-height:1;
      margin-top:10px;
    }
    .stack-head .case-cat{margin-top:12px}
    .stack-hint{
      position:absolute;left:32px;bottom:26px;z-index:40;
      font-size:11px;color:var(--muted);opacity:.75;
      display:inline-flex;align-items:center;gap:6px;pointer-events:none;
    }
    .stack-hint i{font-size:14px}
    .stack-stage{
      position:relative;flex:1;display:flex;align-items:center;justify-content:center;
      perspective:1400px;
    }
    .sframe{
      position:absolute;width:min(70vw,66vh);aspect-ratio:4/3;
      border-radius:50px;overflow:hidden;
      box-shadow:var(--shadow-lg);
      transition:transform .55s cubic-bezier(.22,.61,.36,1),opacity .55s ease,border-radius .55s ease;
      will-change:transform,opacity;backface-visibility:hidden;
      transform-origin:center center;
    }
    .sframe img,.sframe video{
      width:100%;height:100%;object-fit:cover;object-position:top;display:block;
      transform-origin:top center;
      transition:transform .55s cubic-bezier(.22,.61,.36,1);
    }

    /* правый столбец точек-индикаторов кадров */
    .stack-dots{
      position:absolute;right:26px;top:50%;transform:translateY(-50%);
      z-index:40;display:flex;flex-direction:column;gap:9px;
    }
    .sdot{
      width:8px;height:8px;border-radius:50%;border:none;padding:0;cursor:pointer;
      background:var(--border-hover);opacity:.5;transition:opacity .2s,transform .2s,background .2s;
    }
    .sdot:hover{opacity:.8}
    .sdot.active{opacity:1;background:var(--text);transform:scale(1.35)}

    /* нижняя панель — переход между 3D-кейсами + счётчик */
    .stack-foot{
      position:absolute;left:0;right:0;bottom:18px;z-index:40;
      display:flex;align-items:center;justify-content:center;gap:14px;
      pointer-events:none;
    }
    .scase{
      pointer-events:auto;
      display:inline-flex;align-items:center;gap:7px;max-width:42vw;
      padding:9px 16px;border-radius:11px;border:0.5px solid var(--border);
      background:var(--card);color:var(--text);cursor:pointer;
      font-size:12.5px;font-weight:500;
      transition:border-color .2s,transform .2s,box-shadow .2s;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .scase:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:var(--shadow)}
    .scase i{font-size:15px;color:var(--muted);flex-shrink:0}
    .scase-label{overflow:hidden;text-overflow:ellipsis}
    .stack-count{
      pointer-events:auto;
      font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;
      min-width:54px;text-align:center;
    }
    /* ============ SCRUBBER (UX) ============ */
    .scrub{max-width:1160px;margin:0 auto;padding:34px 32px 40px}
    .scrub-head{margin-bottom:22px}
    .scrub-title-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:12px}
    .scrub-title{
      font-family:'Space Grotesk',system-ui,sans-serif;
      font-size:clamp(30px,4vw,48px);font-weight:700;letter-spacing:-.03em;
      line-height:1.05;
    }

    .scrub-window{
      position:relative;                 /* контейнер для двух слоёв кроссфейда */
      width:100%;height:60vh;min-height:340px;
      border-radius:16px;border:0.5px solid var(--border);
      background:var(--surface);overflow:hidden;
    }
    /* два слоя: текущий (.front) и входящий — кроссфейдятся при смене главы
       (smart-animate-эффект: opacity + лёгкий горизонтальный сдвиг) */
    .scrub-layer{
      position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
      scrollbar-width:thin;scrollbar-color:var(--border-hover) transparent;
      opacity:0;pointer-events:none;
      transition:opacity .5s ease,transform .5s cubic-bezier(.22,.61,.36,1);
      will-change:opacity,transform;
      overflow-anchor:none;          /* не даём браузеру править scrollTop при подгрузке картинок (рывки) */
      scroll-behavior:auto;          /* покадровый автоскролл — без smooth-доводки */
    }
    .scrub-layer.front{opacity:1;pointer-events:auto}
    .scrub-layer::-webkit-scrollbar{width:8px}
    .scrub-layer::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:8px}
    .scrub-img{width:100%;display:block}
    .scrub-img:not(:first-child){margin-top:12px} /* разделитель между слайдами группы */
    /* широкий слайд — заполняет высоту (object-fit:cover, без пустот) */
    .scrub-img.fill{height:100%;object-fit:cover;object-position:top}
    /* контентный/высокий слайд — натуральная высота, окно скроллится */
    .scrub-img.tall{height:auto}

    /* таймлайн-скруббер: фоны-чипы (низ) ← линия-плейхед (середина) ← подписи (верх) */
    .scrub-bar{margin-top:18px;user-select:none}
    .timeline{
      position:relative;height:52px;cursor:grab;touch-action:none;
    }
    .timeline.dragging{cursor:grabbing}
    /* слой 1 — фоны-чипы (разная ширина = разное кол-во экранов; без padding,
       чтобы ширины совпадали со слоем подписей и текст был ровно по центру) */
    .tl-bgs{position:absolute;inset:0;display:flex;gap:7px;z-index:0}
    .tl-bg{
      min-width:0;border-radius:13px;background:var(--tag);
      transition:background .25s,flex-grow .35s cubic-bezier(.22,.61,.36,1);
    }
    .tl-bg.active{background:color-mix(in srgb,var(--accent) 22%,var(--bg))}
    /* слой 2 — линия-плейхед: целиком ВНУТРИ чипа, над фоном, под подписью */
    .playhead{
      position:absolute;top:0;bottom:0;left:0;width:0;z-index:1;pointer-events:none;
      transition:transform .3s cubic-bezier(.22,.61,.36,1);
    }
    .timeline.dragging .playhead{transition:none}
    .playhead::before{ /* вертикальная линия — прибита к верху и низу чипа */
      content:'';position:absolute;left:-1px;top:0;bottom:0;width:2px;
      background:var(--text);
    }
    .playhead::after{ /* треугольник-маркер у самого верхнего края */
      content:'';position:absolute;left:-5px;top:0;
      border-left:5px solid transparent;border-right:5px solid transparent;
      border-top:8px solid var(--text);
    }
    /* слой 3 — подписи поверх линии. Текст сидит в плашке цвета чипа, поэтому
       линия закрыта на тексте (исчезает даже при драге), а видна сверху/снизу
       и по бокам. Без padding на ячейке → ширины = слою фонов, текст по центру */
    .tl-labels{position:absolute;inset:0;display:flex;gap:7px;z-index:2;pointer-events:none}
    .tl-label{min-width:0;display:flex;align-items:center;justify-content:center}
    .tl-text{
      max-width:100%;padding:6px 12px;border-radius:9px;background:var(--tag);
      font-size:14px;font-weight:500;color:var(--muted2);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      transition:color .25s,background .25s;
    }
    .tl-label.active .tl-text{
      background:color-mix(in srgb,var(--accent) 22%,var(--bg));
      color:var(--text);font-weight:600;
    }
    .tl-num{display:none}

    /* линейка-рулетка под чипами */
    .tl-ruler{
      position:relative;margin-top:11px;display:flex;justify-content:space-between;
      padding:0 3px;pointer-events:none;
    }
    .tl-tick{width:1px;height:7px;background:var(--border-hover);opacity:.45}
    .tl-tick.major{height:11px;opacity:.7}

    .scrub-foot{display:flex;align-items:center;gap:12px;margin-top:13px}
    .scrub-counter{
      font-size:12px;color:var(--muted);
      font-variant-numeric:tabular-nums;
    }
    .play-btn{
      width:30px;height:30px;border-radius:50%;
      border:1.5px solid var(--border);cursor:pointer;
      background:var(--tag);color:var(--text);font-size:13px;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s,border-color .15s;flex-shrink:0;
      line-height:1;padding:0;
    }
    .play-btn:hover{background:var(--border-hover)}

    /* ============ FALLBACK ============ */
    .fb-hero{
      width:100%;height:440px;overflow:hidden;
      display:flex;align-items:center;justify-content:center;transition:background .25s;
    }
    .fb-hero img,.fb-hero video{width:100%;height:100%;object-fit:cover;display:block}
    .fb-hero-lbl{
      font-family:'Space Grotesk',system-ui,sans-serif;
      font-size:clamp(24px,6vw,72px);font-weight:700;letter-spacing:-.03em;opacity:.12;
    }
    .fb-body{max-width:800px;margin:0 auto;padding:44px 32px 80px}
    .fb-title{
      font-family:'Space Grotesk',system-ui,sans-serif;
      font-size:clamp(30px,5vw,52px);font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:10px;
    }
    .fb-sub{font-size:16px;color:var(--muted);line-height:1.7;margin-bottom:36px}
    .fb-placeholder{
      font-size:14px;color:var(--muted);text-align:center;padding:52px 24px;
      border:0.5px dashed var(--border);border-radius:12px;
    }

    @media(max-width:680px){
      .nav{padding:13px 16px}
      .nav-links{display:none}
      .theme-btn{grid-column:3}
      .stack-head{left:16px;top:16px;right:16px}
      .stack-hint{display:none}
      .stack-foot{flex-wrap:nowrap;gap:8px;padding:0 12px}
      .scase{font-size:11.5px;padding:8px 12px;max-width:38vw}
      .sframe{width:min(88vw,52vh);aspect-ratio:1/1;border-radius:28px}
      .scrub{padding:24px 16px 32px}
      .scrub-window{height:50vh}
      .tl-text{display:none}
      .tl-num{
        display:inline;padding:6px 0;min-width:30px;text-align:center;border-radius:9px;
        background:var(--tag);font-size:12px;font-weight:500;color:var(--muted2);
      }
      .tl-label.active .tl-num{background:color-mix(in srgb,var(--accent) 22%,var(--bg));color:var(--text)}
      .fb-hero{height:240px}
      .fb-body{padding:32px 16px 64px}
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="sg nav-logo" id="navLogo">
      <span class="logo-short" id="logoShort"></span>
      <span class="logo-full">Артём Чернобай</span>
      <div class="logo-fan-tooltip">
        <img src="https://www.google.com/s2/favicons?domain=skrillex.com&sz=32" alt="" class="logo-fan-icon">
        Фанат Skrillex&nbsp;♪
      </div>
    </a>
    <div class="nav-links">
      <a href="index.html#about"   class="nav-link">Обо мне</a>
      <a href="index.html#contact" class="nav-link">Контакты</a>
      <a href="index.html#cases"   class="nav-link">Работы</a>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Переключить тему">
      <i class="ti ti-moon" id="themeIcon"></i>
    </button>
  </nav>

  <main id="stage"></main>

  <script src="cases-data.js"></script>
  <script>
  /* ===== медиа по кейсам (наполняется по мере готовности) ===== */
  const CASE_MEDIA={
    'not-a-robot':{type:'stack',frames:[
      {img:'cases/robot/1.jpg'},
      {img:'cases/robot/2.jpg'},
      {img:'cases/robot/3.jpg'},
      {img:'cases/robot/4.jpg'},
      {img:'cases/robot/5.jpg'},
      {img:'cases/robot/6.jpg'},
      {vid:'cases/robot/video.mp4'},
    ]},
    'listy':{type:'scrubber',groups:[
      {label:'Возможности',  slides:[{img:'cases/listy/1.jpg'}]},
      {label:'Идея и визуал', slides:[{img:'cases/listy/2.jpg'},{img:'cases/listy/3.jpg'}]},
      {label:'Реализация',   slides:[{img:'cases/listy/4.jpg'},{img:'cases/listy/5.jpg'},{img:'cases/listy/6.jpg'}]},
      {label:'Что дальше',   slides:[{img:'cases/listy/7.jpg'}]},
      {label:'Итоги',        slides:[{img:'cases/listy/8.jpg'}]},
    ]},
  };

  /* ===== логотип ===== */
  const SKRILLEX=['Bangarang','Recess','Kyoto','Rumble',
    'Scary Monsters and Nice Sprites','First of the Year','Kill Everybody',
    'Cinema','Bug Hunt','Ease My Mind','Where Are Ü Now','Dirty Vibe',
    'Rock n Roll','Summit',"Don't Go",'Butterflies','Supersonic','RATATA',
    'Still Here','Leave Me Like This'];
  document.getElementById('logoShort').textContent=SKRILLEX[Math.floor(Math.random()*SKRILLEX.length)];

  /* ===== хаптик: Android — Vibration API; iOS Safari — трюк со скрытым
     switch-input (его переключение во время жеста даёт системный селекшн-тик).
     Элемент position:fixed в углу вьюпорта — фокус не вызывает скролл. ===== */
  const _hapLabel=document.createElement('label');
  _hapLabel.setAttribute('aria-hidden','true');
  _hapLabel.style.cssText='position:fixed;bottom:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;overflow:hidden';
  const _hapSwitch=document.createElement('input');
  _hapSwitch.type='checkbox';_hapSwitch.tabIndex=-1;_hapSwitch.setAttribute('switch','');
  _hapLabel.appendChild(_hapSwitch);
  document.body.appendChild(_hapLabel);
  function haptic(){
    try{ if(navigator.vibrate) navigator.vibrate(7); }catch(_){}
    try{ _hapLabel.click(); _hapSwitch.blur(); }catch(_){}
  }

  /* ===== флаг для пропуска прелоадера при возврате на главную ===== */
  document.addEventListener('click',e=>{
    const a=e.target.closest('a[href]');
    if(a&&/index\.html/.test(a.getAttribute('href')||'')){
      try{sessionStorage.setItem('skipPreloader','1');}catch(_){}
    }
  });

  /* ===== тема ===== */
  let theme=localStorage.getItem('theme')||'light';
  function applyTheme(){
    document.documentElement.setAttribute('data-theme',theme==='dark'?'dark':'');
    document.getElementById('themeIcon').className=theme==='dark'?'ti ti-sun':'ti ti-moon';
  }
  function toggleTheme(){
    theme=theme==='light'?'dark':'light';
    localStorage.setItem('theme',theme);
    applyTheme();
    if(window._onTheme)window._onTheme();
  }

  /* ===== роутинг ===== */
  const slug=location.hash.slice(1);
  const c=slug?CASES.find(x=>x.slug===slug):null;
  function gotoCase(s){location.hash=s;location.reload();}

  if(!c){
    location.href='index.html';
  }else{
    applyTheme();
    document.title=c.title+' — Артём Чернобай';
    const media=CASE_MEDIA[slug];
    const stage=document.getElementById('stage');
    if(media&&media.type==='stack')      buildStack(c,media.frames,stage);
    else if(media&&media.type==='scrubber') buildScrubber(c,media.groups,stage);
    else                                  buildFallback(c,stage);
  }

  /* ============================================================
     ВЕРТИКАЛЬНЫЙ СТЕК (3D)
     ============================================================ */
  function buildStack(c,frames,stage){
    const cat=c.cat==='mobile'?'Мобилка':'3D · Blender';
    const sec=document.createElement('section');
    sec.className='stack';

    let framesHTML='';
    frames.forEach((f,i)=>{
      const media=f.vid
        ? `<video src="${f.vid}" loop muted playsinline preload="metadata"></video>`
        : `<img src="${f.img}" alt="${c.title} — кадр ${i+1}">`;
      framesHTML+=`<div class="sframe" data-i="${i}">${media}</div>`;
    });

    // соседние 3D-кейсы для нижней навигации
    const threeD=CASES.filter(x=>x.cat==='3d');
    const ti=threeD.findIndex(x=>x.slug===c.slug);
    const prev=threeD[(ti-1+threeD.length)%threeD.length];
    const next=threeD[(ti+1)%threeD.length];

    sec.innerHTML=`
      <div class="stack-head">
        <a href="index.html" class="back-btn"><i class="ti ti-arrow-left"></i> Назад</a>
        <div class="stack-title">${c.title}</div>
        <span class="case-cat">${cat}</span>
      </div>
      <div class="stack-hint"><i class="ti ti-mouse"></i> Колесо или ↑ ↓ — листать рендеры</div>
      <div class="stack-stage" id="stackStage">${framesHTML}</div>
      <div class="stack-dots" id="stackDots">
        ${frames.map((f,i)=>`<button class="sdot" data-i="${i}" aria-label="Кадр ${i+1}"></button>`).join('')}
      </div>
      <div class="stack-foot">
        <button class="scase scase-prev"><i class="ti ti-chevron-left"></i><span class="scase-label">${prev.title}</span></button>
        <span class="stack-count" id="stackCount">01 / ${String(frames.length).padStart(2,'0')}</span>
        <button class="scase scase-next"><span class="scase-label">${next.title}</span><i class="ti ti-chevron-right"></i></button>
      </div>`;
    stage.appendChild(sec);

    const els=[...sec.querySelectorAll('.sframe')];
    const dots=[...sec.querySelectorAll('.sdot')];
    const stageEl=sec.querySelector('#stackStage');
    const countEl=sec.querySelector('#stackCount');
    let active=0,locked=false;

    function update(){
      const S=els[0].offsetHeight||Math.min(window.innerHeight*0.52,window.innerWidth*0.78);
      const half=S/2, flat=0.11, band=S*flat, edge=10;
      els.forEach((el,i)=>{
        const off=i-active, a=Math.abs(off), dir=off<0?-1:1;
        let ty,sx,sy,op,z;
        if(off===0){ty=0;sx=1;sy=1;op=1;z=30;}
        else{
          ty=dir*(half+edge+band/2+(a-1)*(band+8));
          sx=Math.max(0.7,1-a*0.06);
          sy=flat;
          op=a===1?0.5:(a===2?0.14:0);
          z=30-a;
        }
        el.style.transform=`translateY(${ty}px) scale(${sx},${sy})`;
        el.style.opacity=op;
        el.style.zIndex=z;
        // контр-масштаб медиа: соседи показывают верхний срез картинки в натуральных
        // пропорциях (fill по высоте), а не сплющенную целую картинку
        const m=el.firstElementChild;
        if(m)m.style.transform=`scaleY(${1/sy})`;
        // сжатые соседи — скругление-«пилюля»: радиус задаём эллипсом, чтобы после
        // squish по вертикали концы выглядели полностью закруглёнными, а не обрубком
        if(off===0)el.style.borderRadius='';
        else{const rr=band/2;el.style.borderRadius=`${rr}px / ${(rr/sy).toFixed(1)}px`;}
      });
      dots.forEach((d,i)=>d.classList.toggle('active',i===active));
      countEl.textContent=String(active+1).padStart(2,'0')+' / '+String(els.length).padStart(2,'0');
      // видео: играем активное, остальные пауза
      els.forEach((el,i)=>{
        const v=el.querySelector('video');
        if(!v)return;
        if(i===active){
          const tryPlay=()=>{const p=v.play();if(p&&p.catch)p.catch(()=>{});};
          tryPlay();
          if(v.readyState<3)v.addEventListener('canplay',()=>{if(active===i)tryPlay();},{once:true});
        }else v.pause();
      });
    }
    function go(d){
      const n=Math.max(0,Math.min(els.length-1,active+d));
      if(n===active)return;
      active=n;update();
    }

    // колесо
    stageEl.addEventListener('wheel',e=>{
      e.preventDefault();
      if(locked)return;
      if(Math.abs(e.deltaY)<8)return;
      locked=true;
      go(e.deltaY>0?1:-1);
      setTimeout(()=>locked=false,480);
    },{passive:false});

    // драг вертикальный
    let dy0=null;
    stageEl.addEventListener('pointerdown',e=>{dy0=e.clientY;stageEl.setPointerCapture(e.pointerId);});
    stageEl.addEventListener('pointermove',e=>{
      if(dy0===null)return;
      const d=e.clientY-dy0;
      if(Math.abs(d)>55){go(d<0?1:-1);dy0=e.clientY;}
    });
    stageEl.addEventListener('pointerup',()=>dy0=null);
    stageEl.addEventListener('pointercancel',()=>dy0=null);

    // точки
    dots.forEach(d=>d.addEventListener('click',()=>{active=+d.dataset.i;update();}));

    // клавиатура
    window.addEventListener('keydown',e=>{
      if(e.key==='ArrowDown'){e.preventDefault();go(1);}
      else if(e.key==='ArrowUp'){e.preventDefault();go(-1);}
    });

    // навигация между кейсами
    sec.querySelector('.scase-prev').addEventListener('click',()=>gotoCase(prev.slug));
    sec.querySelector('.scase-next').addEventListener('click',()=>gotoCase(next.slug));

    window.addEventListener('resize',update);
    requestAnimationFrame(update);
    // повторный апдейт после загрузки первого кадра (offsetHeight)
    if(els[0].querySelector('img')){
      const im=els[0].querySelector('img');
      if(im.complete)requestAnimationFrame(update);
      else im.addEventListener('load',update,{once:true});
    }
  }

  /* ============================================================
     ГОРИЗОНТАЛЬНЫЙ СКРУББЕР (UX)
     ============================================================ */
  function buildScrubber(c,groups,stage){
    const cat=c.cat==='mobile'?'Мобилка':'Веб';
    const sec=document.createElement('section');
    sec.className='scrub';

    const N=groups.length;
    // вес чипа = число экранов в группе (где больше контента — кнопка шире)
    const weight=g=>g.slides.length;

    sec.innerHTML=`
      <div class="scrub-head">
        <a href="index.html" class="back-btn"><i class="ti ti-arrow-left"></i> Назад</a>
        <div class="scrub-title-row">
          <h1 class="scrub-title">${c.title}</h1>
          <span class="case-cat">${cat}</span>
        </div>
      </div>
      <div class="scrub-window" id="scrubWindow"></div>
      <div class="scrub-bar">
        <div class="timeline" id="timeline">
          <div class="tl-bgs">
            ${groups.map((g,i)=>`<div class="tl-bg${i===0?' active':''}" data-i="${i}" style="flex:${weight(g)} 1 0"></div>`).join('')}
          </div>
          <div class="playhead" id="playhead"></div>
          <div class="tl-labels">
            ${groups.map((g,i)=>`<div class="tl-label${i===0?' active':''}" style="flex:${weight(g)} 1 0"><span class="tl-text">${g.label}</span><span class="tl-num">${i+1}</span></div>`).join('')}
          </div>
        </div>
        <div class="tl-ruler">${Array.from({length:41},(_,i)=>`<span class="tl-tick${i%5===0?' major':''}"></span>`).join('')}</div>
        <div class="scrub-foot">
          <button class="play-btn" id="playBtn" aria-label="воспроизвести">▶</button>
          <div class="scrub-counter" id="scrubCounter"></div>
        </div>
      </div>`;
    stage.appendChild(sec);

    const timeline=sec.querySelector('#timeline');
    const bgEls=[...sec.querySelectorAll('.tl-bg')];
    const labelEls=[...sec.querySelectorAll('.tl-label')];
    const playhead=sec.querySelector('#playhead');
    const win=sec.querySelector('#scrubWindow');
    const counter=sec.querySelector('#scrubCounter');
    const playBtn=sec.querySelector('#playBtn');
    let active=-1;

    // ── AUTOPLAY: виртуальные часы autoT (мс) с адаптивной скоростью ──
    // каждая глава получает время по числу экранов: больше/выше контента —
    // дольше показ и медленнее скролл (ощущение «успеваешь рассмотреть»)
    const VIEW_BASE=4200;   // мс на просмотр главы (≈2x медленнее прежнего)
    const PER_SLIDE=5200;   // +мс на каждый доп. экран в группе (адаптив по высоте)
    const segDur=i=>VIEW_BASE+(groups[i].slides.length-1)*PER_SLIDE;
    const segCum=[]; let _acc=0;
    for(let i=0;i<N;i++){segCum[i]=_acc;_acc+=segDur(i);}
    const TOTAL=_acc;
    const segAtT=T=>{for(let i=N-1;i>=0;i--){if(T>=segCum[i])return i;}return 0;};

    let autoPlay=false,autoT=0,lastAutoTs=null;
    let dwellEnd=-1,dwellI=-1; // «заморозка» на дне скролла между главами
    const DWELL_MS=2000;       // пауза только для глав со скроллом
    function updatePlayBtn(){
      playBtn.textContent=autoT>=TOTAL?'↺':autoPlay?'⏸':'▶';
    }
    function tickAuto(ts){
      if(!autoPlay)return;
      if(!dragging){
        // ── фаза паузы на дне скролла ──
        if(dwellEnd>0){
          lastAutoTs=ts;
          // держим плейхед у правого края чипа и скролл на дне
          const db=bgEls[dwellI];
          placePlayheadPx(db.offsetLeft+db.offsetWidth);
          if(front){const ms=front.scrollHeight-front.clientHeight;if(ms>0)front.scrollTop=ms;}
          if(ts<dwellEnd){requestAnimationFrame(tickAuto);return;}
          dwellEnd=-1;dwellI=-1; // пауза истекла — едем дальше
        }
        if(lastAutoTs!==null)autoT+=(ts-lastAutoTs);
        lastAutoTs=ts;
        const ended=autoT>=TOTAL;
        if(ended)autoT=TOTAL;
        const i=segAtT(autoT);
        const lf=Math.max(0,Math.min(1,(autoT-segCum[i])/segDur(i)));
        const b=bgEls[i];
        placePlayheadPx(b.offsetLeft+lf*b.offsetWidth);
        setGroup(i,true);
        const maxScroll=front?front.scrollHeight-front.clientHeight:0;
        if(maxScroll>0)front.scrollTop=Math.round(lf*maxScroll);
        // конец главы + есть что скроллить → запускаем паузу перед следующей
        if(!ended&&lf>=1&&i<N-1&&maxScroll>0&&dwellEnd<0){
          autoT=segCum[i]+segDur(i)-1; // держим в этом сегменте на 1мс
          dwellEnd=ts+DWELL_MS;dwellI=i;
          if(front)front.scrollTop=maxScroll;
          requestAnimationFrame(tickAuto);return;
        }
        if(ended){autoPlay=false;updatePlayBtn();return;}
      }
      requestAnimationFrame(tickAuto);
    }
    function startAuto(){autoPlay=true;lastAutoTs=null;updatePlayBtn();requestAnimationFrame(tickAuto);}
    function pauseAuto(){autoPlay=false;updatePlayBtn();}
    function toggleAuto(){
      if(autoT>=TOTAL){autoT=0;lastAutoTs=null;startAuto();}
      else if(autoPlay)pauseAuto();
      else startAuto();              // продолжает с autoT (синхронизирован при драге)
      haptic();
    }
    playBtn.addEventListener('click',toggleAuto);

    // позиционирование плейхеда: либо в пикселях (драг), либо к центру группы
    function placePlayheadPx(px){ playhead.style.transform=`translateX(${px}px)`; }
    function placePlayheadGroup(i){
      const b=bgEls[i];
      placePlayheadPx(b.offsetLeft+b.offsetWidth/2);
    }
    function groupAtX(px){
      for(let i=0;i<N;i++){ const b=bgEls[i]; if(px<=b.offsetLeft+b.offsetWidth) return i; }
      return N-1;
    }

    // широкий одиночный слайд заполняет окно (cover); контентный/высокий и
    // любые слайды в группе из нескольких — натуральная высота + скролл окна
    function applyMode(img,single){
      if(single && img.naturalWidth && img.naturalHeight/img.naturalWidth<=0.62){
        img.classList.add('fill');img.classList.remove('tall');
      }else{
        img.classList.add('tall');img.classList.remove('fill');
      }
    }

    // два слоя кроссфейда внутри окна
    const layerA=document.createElement('div');layerA.className='scrub-layer';
    const layerB=document.createElement('div');layerB.className='scrub-layer';
    win.append(layerA,layerB);
    let front=null;
    // прогрев кэша — чтобы при доезде линии до главы картинки уже были загружены
    // (иначе scrollHeight=0 и скролл не успевает включиться)
    groups.forEach(g=>g.slides.forEach(s=>{const p=new Image();p.src=s.img;}));

    function renderInto(layer,i){
      const g=groups[i], single=g.slides.length===1;
      layer.innerHTML='';
      g.slides.forEach((s,k)=>{
        const im=document.createElement('img');
        im.className='scrub-img';
        im.src=s.img;
        im.alt=c.title+' — '+g.label+(single?'':' · '+(k+1));
        const fit=()=>applyMode(im,single);
        if(im.complete&&im.naturalWidth)fit(); else im.addEventListener('load',fit,{once:true});
        layer.appendChild(im);
      });
      layer.scrollTop=0;
    }

    // smart-animate-смена главы: входящий слой въезжает со сдвигом + проявляется,
    // уходящий гаснет и уезжает в обратную сторону. instant — мгновенно (ручной драг)
    function swapTo(i,dir,instant){
      const incoming=(front===layerA)?layerB:layerA;
      renderInto(incoming,i);
      const out=front;
      if(instant){
        if(out){out.style.transition='none';out.classList.remove('front');out.style.transform='';}
        incoming.style.transition='none';incoming.style.transform='';incoming.classList.add('front');
        void incoming.offsetWidth;
        incoming.style.transition='';if(out)out.style.transition='';
      }else{
        const off=dir>=0?28:-28;
        incoming.style.transition='none';
        incoming.style.transform=`translateX(${off}px)`;
        void incoming.offsetWidth;              // reflow → фиксируем стартовую точку
        incoming.style.transition='';
        incoming.classList.add('front');         // opacity 0→1
        incoming.style.transform='translateX(0)';
        if(out){out.classList.remove('front');out.style.transform=`translateX(${-off}px)`;} // opacity→0
      }
      front=incoming;
    }

    function setGroup(i,fromDrag){
      i=Math.max(0,Math.min(N-1,i));
      if(i!==active){
        swapTo(i,active===-1?1:i-active,dragging); // во время ручного драга — мгновенно
        active=i;
      }
      bgEls.forEach((b,k)=>b.classList.toggle('active',k===i));
      labelEls.forEach((l,k)=>l.classList.toggle('active',k===i));
      const cnt=groups[i].slides.length;
      counter.textContent=String(i+1).padStart(2,'0')+' / '+String(N).padStart(2,'0')+' · '+groups[i].label+(cnt>1?' · '+cnt+' экр.':'');
      if(!fromDrag)placePlayheadGroup(i);
    }

    // драг-скраб мышкой/пальцем по всему таймлайну (клик по чипу = тоже сюда)
    let dragging=false,lastTick=-1,lastClientX=0;
    const TICKS=40; // делений линейки = интервалов для тик-хаптика
    function xFromClient(clientX){
      const r=timeline.getBoundingClientRect();
      return Math.max(0,Math.min(r.width,clientX-r.left));
    }
    function onMove(clientX){
      lastClientX=clientX;
      const px=xFromClient(clientX);
      placePlayheadPx(px);          // линия едет ровно за курсором
      setGroup(groupAtX(px),true);  // активная группа — под курсором
      // тик-хаптик как «барабан» пикера: стук на каждом делении линейки
      const ti=Math.round(px/(timeline.clientWidth/TICKS));
      if(ti!==lastTick){ lastTick=ti; haptic(); }
    }
    timeline.addEventListener('pointerdown',e=>{
      dragging=true;timeline.classList.add('dragging');lastTick=-1;
      try{timeline.setPointerCapture(e.pointerId);}catch(_){}
      onMove(e.clientX);
    });
    timeline.addEventListener('pointermove',e=>{if(dragging)onMove(e.clientX);});
    function endDrag(){
      if(!dragging)return;
      dragging=false;timeline.classList.remove('dragging');
      // ручной выбор главы → ▶ играет её С НАЧАЛА; горизонтальное место тапа
      // НЕ привязывается к внутреннему скроллу (иначе тык в правый край большой
      // главы неожиданно проматывал картинку — это сбивало)
      const px=xFromClient(lastClientX);
      const i=groupAtX(px);
      autoT=segCum[i];
      lastAutoTs=null;
      dwellEnd=-1;dwellI=-1; // отменить паузу если была
      updatePlayBtn();
    }
    timeline.addEventListener('pointerup',endDrag);
    timeline.addEventListener('pointercancel',endDrag);

    // клавиатура: ←/→ группы, Space = play/pause
    function goGroup(i){
      i=Math.max(0,Math.min(N-1,i));
      setGroup(i);
      autoT=segCum[i];lastAutoTs=null;
      dwellEnd=-1;dwellI=-1; // отменить паузу если была
      updatePlayBtn();
    }
    window.addEventListener('keydown',e=>{
      if(e.key==='ArrowRight'){e.preventDefault();goGroup(active+1);}
      else if(e.key==='ArrowLeft'){e.preventDefault();goGroup(active-1);}
      else if(e.key===' '){e.preventDefault();toggleAuto();}
    });

    window.addEventListener('resize',()=>requestAnimationFrame(()=>placePlayheadGroup(active)));
    requestAnimationFrame(()=>setGroup(0));
  }

  /* ============================================================
     FALLBACK — кейсы без медиа
     ============================================================ */
  function buildFallback(c,stage){
    const cat=c.cat==='mobile'?'Мобилка':'3D · Blender';
    const hero=document.createElement('div');
    hero.className='fb-hero';
    hero.style.background=theme==='dark'?c.dbg:c.lbg;
    if(c.vid){
      const v=document.createElement('video');
      v.src=c.vid;v.autoplay=true;v.loop=true;v.muted=true;v.playsInline=true;
      if(c.rate){v.defaultPlaybackRate=c.rate;v.playbackRate=c.rate;}
      hero.appendChild(v);
    }else if(c.img){
      const im=document.createElement('img');im.src=c.img;im.alt=c.title;hero.appendChild(im);
    }else{
      const l=document.createElement('div');l.className='fb-hero-lbl';l.textContent=c.title;hero.appendChild(l);
    }
    const body=document.createElement('div');
    body.className='fb-body';
    body.innerHTML=`
      <a href="index.html" class="back-btn" style="margin-bottom:16px"><i class="ti ti-arrow-left"></i> Назад</a>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;margin-bottom:36px;gap:12px">
        <h1 class="fb-title" style="margin:0">${c.title}</h1>
        <span class="case-cat">${cat}</span>
      </div>
      <div class="fb-placeholder">Кейс-стади в разработке</div>`;
    stage.appendChild(hero);
    stage.appendChild(body);
    window._onTheme=()=>{hero.style.background=theme==='dark'?c.dbg:c.lbg;};
  }
  </script>
